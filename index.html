<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>🐟 梁sir的木魚</title>
  <meta name="description" content="梁sir木魚">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<div class="centerContent">

  <!-- ===== HEADER ===== -->
  <div id="top">
    <div class="logo">
      <!-- 注意，本版本加入了防小人功能 -->
      <span id="titleText" class="titleDisplay">🐟 梁sir的木魚</span>
    </div>
    <div class="score">
    <!-- 注意，本版本加入了防小人功能 -->
      <div class="count" id="countDisplay">0</div>
      <div class="subtitle">梁sir的功德</div>
    </div>
  </div>

  <!-- ===== FISH ===== -->
  <div id="center">
    <svg
      class="myFish"
      width="247" height="197"
      viewBox="0 0 247 197"
      xmlns="http://www.w3.org/2000/svg"
      aria-label="木鱼"
      role="button"
      tabindex="0"
    >
      <defs>
        <linearGradient id="g-body" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#FEF3C7"/>
          <stop offset="40%"  stop-color="#FCD34D"/>
          <stop offset="75%"  stop-color="#F59E0B"/>
          <stop offset="100%" stop-color="#D97706"/>
        </linearGradient>
        <linearGradient id="g-shine" x1="10%" y1="0%" x2="85%" y2="80%">
          <stop offset="0%"   stop-color="rgba(255,255,255,0.55)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </linearGradient>
        <filter id="f-glow" x="-15%" y="-15%" width="130%" height="130%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
          <feFlood flood-color="#F59E0B" flood-opacity="0.25" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="glow"/>
          <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="g-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#B45309"/>
          <stop offset="100%" stop-color="#92400E"/>
        </linearGradient>
      </defs>
      <path fill="url(#g-body)" stroke="url(#g-stroke)" stroke-width="1.2" filter="url(#f-glow)"
        d="M 109.12 6.53 C 124.09 4.27 139.37 2.82 154.47 4.79
           C 173.07 7.14 191.38 14.02 206.02 25.89
           C 217.01 34.77 225.17 46.63 231.55 59.13
           C 237.81 72.25 241.16 86.53 243.92 100.74
           C 225.49 104.75 206.58 105.76 187.77 106.20
           C 186.21 100.02 183.12 93.94 177.74 90.25
           C 172.00 85.96 163.98 84.19 157.26 87.18
           C 145.99 91.69 139.62 105.22 142.63 116.85
           C 145.12 127.39 154.97 136.11 166.05 135.69
           C 176.18 134.97 184.61 126.81 187.19 117.22
           C 192.74 116.73 198.32 116.63 203.89 116.32
           C 217.57 115.26 231.14 113.14 244.82 111.98
           C 245.52 121.28 246.13 130.75 244.11 139.94
           C 242.32 149.02 239.23 158.07 233.39 165.39
           C 224.88 176.55 212.15 183.64 199.01 187.98
           C 187.42 191.86 175.20 193.41 163.05 194.29
           C 140.40 195.87 117.64 195.62 94.99 194.19
           C 74.79 192.81 54.55 190.78 34.79 186.17
           C 27.91 184.54 21.07 182.47 14.77 179.21
           C 8.58 175.93 4.23 169.71 2.72 162.92
           C -0.48 151.41 3.00 139.09 9.20 129.21
           C 14.61 119.75 27.61 116.88 30.81 105.83
           C 35.50 90.01 37.28 73.40 42.87 57.82
           C 47.56 45.36 54.34 33.26 64.82 24.75
           C 77.25 14.19 93.24 9.04 109.12 6.53 Z"/>
      <path fill="url(#g-shine)" opacity="0.65"
        d="M 109 6.5 C 130 4 155 3 170 6 C 155 8 130 9 109 6.5 Z"/>
      <path stroke="rgba(146,64,14,0.2)" stroke-width="1.2" stroke-linecap="round" fill="none"
        d="M 70 45 Q 120 36 172 44"/>
      <path stroke="rgba(146,64,14,0.15)" stroke-width="1" stroke-linecap="round" fill="none"
        d="M 50 72 Q 115 58 175 70"/>
      <path stroke="rgba(146,64,14,0.12)" stroke-width="0.8" stroke-linecap="round" fill="none"
        d="M 38 98 Q 108 82 175 96"/>
      <circle cx="185" cy="115" r="7.5" fill="white" opacity="0.9"/>
      <circle cx="185" cy="115" r="5.5" fill="#7C3AED"/>
      <circle cx="185" cy="115" r="3"   fill="#1E1B4B"/>
      <circle cx="186.8" cy="113.2" r="1.5" fill="white" opacity="0.85"/>
    </svg>
  </div>

  <!-- ===== CONTROLS ===== -->
  <div id="bottom">

    <!-- 操作提示 -->
    <div class="keyTips">
      ✨ 按下 <key>空格键</key> 或 <key>點擊木魚</key> 積攢功德 ✨
    </div>

    <!-- 自动敲 + 间隔 + 每次功德（输入框，仅 ≤ -1） -->
    <div class="keyTips">
      <div class="flexRow">
        <div class="autoClick" id="autoClick">▶ 自動敲</div>
        <div class="intervalControl">
          <span class="intervalLabel">間隔</span>
          <input type="number" id="intervalInput" class="intervalInput"
                 value="500" min="20" step="10" aria-label="自動敲間隔">
          <span class="intervalLabel">ms</span>
        </div>
        <div class="countControl">
          <span class="intervalLabel">每次功德</span>
          <div class="countBtn" id="decrementKnock" aria-label="减少功德變化量">−</div>
          <input type="text" inputmode="numeric" id="knockValue" class="knockValue"
                 value="-1" maxlength="6" aria-label="每次功德變化量">
          <div class="countBtn" id="incrementKnock" aria-label="增加功德變化量">+</div>
          <div class="countBtn reset" id="resetKnock" aria-label="重置功德變化量">重置</div>
        </div>
      </div>
    </div>

    <!-- 手动修改功德数 -->
    <div class="keyTips">
      <div class="flexRow">
        <span class="intervalLabel">修改功德數</span>
        <input type="number" id="countInput" class="intervalInput"
               style="width:100px;" value="0" step="1" aria-label="手動設置功德數">
        <div class="countBtn" id="setCountBtn">設定</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="leftRight">
      <div class="left">
        <!-- 🐟 點擊觸發敲木魚 -->
        <span id="footerFish" class="fishBtn" title="fish" role="button" tabindex="0">🐟</span>
        <!-- 開發者模式 -->
        <span id="footerPhrase" class="footerPhrase"
              title="開發者模式" role="button" tabindex="0"
              aria-label="輸入PIN">
          敲梁sir木魚，見梁sir炸機，獲上傳病毒。
        </span>
      </div>
      <div class="right">
        <a href="happy.mp3" target="_blank" class="textButton">版本號:V5.0.1</a>
      </div>
    </div>

  </div>
</div><!-- /centerContent -->

<!-- PIN獲取 -->
<div id="settingsOverlay" class="settings-overlay hidden"
     role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
  <div class="settings-card">

    <!-- 標題 -->
    <div class="settings-header">
      <h3 class="settings-title" id="settingsTitle">🛠️ 開發人員模式</h3>
      <button class="settings-close-btn" id="settingsCloseBtn" aria-label="關閉">✕</button>
    </div>

    <!-- 第一步：輸入PIN -->
    <div id="settingsStep1">
      <p class="settings-desc">輸入PIN</p>
      <div class="settings-pwd-row">
        <input type="password" id="settingsPwd" class="settings-input"
               placeholder="PIN" autocomplete="off" maxlength="32">
        <button id="settingsVerifyBtn" class="btn-verify">檢 查</button>
      </div>
      <p id="settingsPwdError" class="settings-error"></p>
    </div>

    <!-- 第二步：調試 -->
    <div id="settingsStep2" class="hidden">
      <!--  每次功德提示 -->
      <div class="setting-row">
        <label class="setting-label" for="settingsFloatText">功德浮窗</label>
        <span class="setting-hint">💡 用 {n} 代表功德變化數值（如 +1 或 -1）</span>
        <input type="text" id="settingsFloatText" class="settings-input"
               placeholder="梁sir功德 {n}" maxlength="50">
      </div>

      <!-- 2. 頁面標題 -->
      <div class="setting-row">
        <label class="setting-label" for="settingsHtmlTitle">頁面標題（&lt;title&gt;）</label>
        <input type="text" id="settingsHtmlTitle" class="settings-input"
               placeholder="🐟 梁sir的木魚" maxlength="80">
      </div>

      <!-- 3. 大標題 -->
      <div class="setting-row">
        <label class="setting-label" for="settingsPageTitle">大標題</label>
        <input type="text" id="settingsPageTitle" class="settings-input"
               placeholder="🐟 梁sir的木魚" maxlength="30">
      </div>

      <!-- 4. 副標題 -->
      <div class="setting-row">
        <label class="setting-label" for="settingsSubtitle">功德副標題</label>
        <input type="text" id="settingsSubtitle" class="settings-input"
               placeholder="梁sir的功德" maxlength="30">
      </div>

      <!-- 5. 底部口號 -->
      <div class="setting-row">
        <label class="setting-label" for="settingsFooter">底部口號</label>
        <input type="text" id="settingsFooter" class="settings-input"
               placeholder="敲梁sir木魚，見梁sir炸機，獲上傳病毒。" maxlength="80">
      </div>

      <!-- 6. 当前功德數 -->
      <div class="setting-row">
        <label class="setting-label" for="settingsMeritCount">当前功德數</label>
        <span class="setting-hint">💡 以後會移除非調試修改的功能</span>
        <input type="number" id="settingsMeritCount" class="settings-input"
               placeholder="0" step="1">
      </div>

      <div class="settings-actions">
        <button id="settingsCancelBtn" class="btn-cancel">取消</button>
        <button id="settingsSaveBtn"   class="btn-save">確定</button>
      </div>
    </div>

  </div>
</div>

<script src="./js/main.js"></script>
<script src="./js/enhancements.js"></script>
</body>
</html>
